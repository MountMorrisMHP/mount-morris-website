# Render deployment blueprint for the Mount Morris website.
# Render reads this automatically when you create a "Blueprint" from the repo.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: mount-morris-website
    runtime: node
    plan: free
    region: ohio            # closest US region to Michigan; change if you like
    buildCommand: npm install
    startCommand: node server.js
    autoDeploy: true        # redeploy automatically when the client commits a change
    healthCheckPath: /api/listings
