name: Build & Deploy to GitHub Pages

# Rebuild the static site whenever the code or the listing folders change.
on:
  push:
    branches: [main]
  workflow_dispatch:   # lets you trigger a rebuild manually from the Actions tab

# Permissions the Pages deploy action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # build.js reads folders 1-3, writes dist/ (listings.json + index.html +
      # images). It deliberately ignores 0_TEMPLATES and 4_OCCUPIED_HOMES.
      - name: Build static site
        run: node build.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload build output
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
