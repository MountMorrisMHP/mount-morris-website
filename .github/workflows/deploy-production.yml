name: Deploy to Production

# Production updates two ways:
#   (a) MANUAL button (workflow_dispatch) — for CODE releases. Versioned with a
#       git tag + GitHub Release.
#   (b) AUTOMATIC — when the client edits listing data on main. A push to main
#       that touches mount-morris-management/** deploys with no button, no tag.
# Code-only pushes to main do NOT match the paths filter, so they never
# auto-deploy — promote those through the staging branch instead.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (leave blank to auto-generate, e.g. v2026.06.11-1430)"
        required: false
        default: ""
  push:
    branches: [main]
    paths:
      - "mount-morris-management/**"

permissions:
  contents: write        # push the built site to gh-pages AND create tags/releases

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never interrupt a production publish mid-way

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production     # tracks deploy history + shows the live URL
      url: https://mountmorrismhp.github.io/mount-morris-website/
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so tagging works

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Manual run: use the typed version (or auto). Auto/data push: timestamp.
      - name: Determine version
        id: ver
        run: |
          V="${{ github.event.inputs.version }}"
          if [ -z "$V" ]; then V="v$(date -u +'%Y.%m.%d-%H%M')"; fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Deploying production $V (trigger: ${{ github.event_name }})"

      - name: Build static site (folders 1-3 only)
        run: node build.js
        env:
          VERSION: ${{ steps.ver.outputs.version }}

      - name: Publish to gh-pages root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          # keep_files preserves the /staging subfolder on the same branch.
          keep_files: true
          full_commit_message: "Deploy production ${{ steps.ver.outputs.version }} (${{ github.sha }})"

      # Only MANUAL code releases get a tag + Release. Automatic client data
      # deploys just publish, so we don't create a tag on every listing edit.
      - name: Tag and create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="${{ steps.ver.outputs.version }}"
          if git rev-parse "$V" >/dev/null 2>&1; then
            echo "Tag $V already exists — skipping tag/release creation."
            exit 0
          fi
          git tag -a "$V" -m "Production deploy $V"
          git push origin "$V"
          gh release create "$V" \
            --title "$V" \
            --notes "Production deploy from \`${{ github.ref_name }}\` @ ${{ github.sha }} on $(date -u '+%Y-%m-%d %H:%M UTC'). Live at https://mountmorrismhp.github.io/mount-morris-website/"
