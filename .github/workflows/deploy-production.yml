name: Deploy to Production

# Production NEVER deploys automatically — not for code, not for client data.
# It publishes ONLY when someone presses the button:
#   Actions tab -> "Deploy to Production" -> Run workflow -> Run
# That button press is the confirmation step. It builds whatever is currently on
# the chosen branch (default: main) and publishes it to the public site root,
# versioned with a git tag + GitHub Release so any deploy can be rolled back.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (leave blank to auto-generate, e.g. v2026.06.11-1430)"
        required: false
        default: ""

permissions:
  contents: write        # push the built site to gh-pages AND create tags/releases

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never interrupt a production publish mid-way

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production     # tracks deploy history + shows the live URL
      url: https://mountmorrismhp.github.io/mount-morris-website/
    steps:
      - name: Check out the repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history so tagging works

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Determine version
        id: ver
        run: |
          V="${{ github.event.inputs.version }}"
          if [ -z "$V" ]; then V="v$(date -u +'%Y.%m.%d-%H%M%S')"; fi   # seconds avoid same-minute collisions
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Deploying production $V"

      # Fail fast on bad data — never build/publish a malformed listing.
      - name: Validate listing data
        run: node validate.js

      - name: Build static site (folders 1-3 only)
        run: node build.js
        env:
          VERSION: ${{ steps.ver.outputs.version }}

      - name: Publish to gh-pages root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          # keep_files preserves the /staging subfolder on the same branch.
          keep_files: true
          full_commit_message: "Deploy production ${{ steps.ver.outputs.version }} (${{ github.sha }})"

      # Tagging is best-effort: the publish above already shipped the site, so a
      # tag hiccup (a version name with spaces, a duplicate, etc.) must NEVER fail
      # the deploy. continue-on-error keeps the run green if anything here trips.
      - name: Tag and create GitHub Release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="${{ steps.ver.outputs.version }}"
          # Git tag names can't contain spaces or most punctuation — derive a safe one.
          TAG=$(printf '%s' "$V" | tr ' ' '-' | tr -cd 'A-Za-z0-9._-')
          if [ -z "$TAG" ]; then TAG="v$(date -u +'%Y.%m.%d-%H%M%S')"; fi
          git fetch --tags --force -q || true
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1 || git ls-remote --exit-code --tags origin "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Production deploy $V"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$V" \
            --notes "Production deploy from \`${{ github.ref_name }}\` @ ${{ github.sha }} on $(date -u '+%Y-%m-%d %H:%M UTC'). Live at https://mountmorrismhp.github.io/mount-morris-website/"
