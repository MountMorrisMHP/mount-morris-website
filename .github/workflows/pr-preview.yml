name: PR Preview

# Every open pull request gets its own temporary preview site at
#   https://mountmorrismhp.github.io/mount-morris-website/pr-preview/pr-<N>/
# The preview is updated on each push and removed automatically when the PR closes.
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write        # to write the preview into the gh-pages branch
  pull-requests: write   # to post the preview link as a PR comment

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Skip the build when the PR is just being closed (we only clean up then).
      - name: Build static site
        if: github.event.action != 'closed'
        run: node build.js

      - name: Deploy / update / remove preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
